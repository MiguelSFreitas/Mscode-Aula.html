<!DOCTYPE html>
<html lang="pt pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MSCODE</title>
    <link rel="stylesheet" href="pagestyle.css">
</head>
<body>
    <header>
        <h1>Login | MSCODE</h1>
    </header>

    <main>
        <section class="form-section">
            <form>
                <label>Seu Nome:</label>
                <input type="text" id="name" name="name" placeholder="João Paulo" required>
                
                

                <br><br>
                
                <label>Data de nascimento:</label>
                <input type="date" id="date" name="date"  required>
                
                <br><br>
                
                <label>Cidade:</label>
                <input type="text" id="text" name="cidade" placeholder="Sua cidade">
                
                <br><br>

                <label>estado:</label>
                <select name="estado" id="estado" required>
                    <option value="">Selecione um estado</option>
                    <option value="AC">Acre (AC)</option>
                    <option value="AL">Alagoas (AL)</option>
                    <option value="AP">Amapá (AP)</option>
                    <option value="AM">Amazonas (AM)</option>
                    <option value="BA">Bahia (BA)</option>
                    <option value="CE">Ceará (CE)</option>
                    <option value="DF">Distrito Federal (DF)</option>
                    <option value="ES">Espírito Santo (ES)</option>
                    <option value="GO">Goiás (GO)</option>
                    <option value="MA">Maranhão (MA)</option>
                    <option value="MT">Mato Grosso (MT)</option>
                    <option value="MS">Mato Grosso do Sul (MS)</option>
                    <option value="MG">Minas Gerais (MG)</option>
                    <option value="PA">Pará (PA)</option>
                    <option value="PB">Paraíba (PB)</option>
                    <option value="PR">Paraná (PR)</option>
                    <option value="PE">Pernambuco (PE)</option>
                    <option value="PI">Piauí (PI)</option>
                    <option value="RJ">Rio de Janeiro (RJ)</option>
                    <option value="RN">Rio Grande do Norte (RN)</option>
                    <option value="RS">Rio Grande do Sul (RS)</option>
                    <option value="RO">Rondônia (RO)</option>
                    <option value="RR">Roraima (RR)</option>
                    <option value="SC">Santa Catarina (SC)</option>
                    <option value="SP">São Paulo (SP)</option>
                    <option value="SE">Sergipe (SE)</option>
                    <option value="TO">Tocantins (TO)</option>
                </select>

                <br><br>
                
                <label> Seu E-mail:</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required/>
                
                <br><br>
                
                <label>Sua Senha:</label>
                <input type="password" id="password" name="password" placeholder="1234" required/>
               
                <br><br>

                <a href="https://www.apple.com/legal/internet-services/itunes/br/terms.html">Termos de uso</a>
                
                <input type="checkbox" id="termos" name="termos"  required/>
                <label for="termos">Aceitos os termos de uso</label>
                
                <br><br>

                <button type="submit">Login</button>
            </form>
        </section>
    </main>
    

    <footer>
        <hr>
        <p>MSCODE&copy;  <br>Todos direitos reservados </p>
    </footer>
</body>
</html>
